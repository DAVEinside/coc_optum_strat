# Balanced: heroes maxed, most defenses, key troops/spells/pets, ~50% walls.
# Matches the user's intuition that "max heroes is important; not all troops; ~40-60% walls."
starting_th: 15
target_th: 16
builders: 6

heroes: all_max

defenses: all_max     # defenses still all max — they decide attack outcomes
storages: all_max     # need the storage caps for the resources

# Skip army buildings that mostly just unlock new levels for troops we won't use
army_buildings:
  - Laboratory
  - Spell Factory
  - Dark Spell Factory
  - Clan Castle
  - Pet House
  - Army Camp

resource_buildings: all_max

# Only key meta troops at TH16 — Root Rider, Electro Titan, Healer, Super Archer/Bowler etc.
troops:
  mode: whitelist
  whitelist:
    - Healer
    - Hog Rider
    - Wall Breaker
    - Electro Titan
    - Root Rider
    - Super Archer
    - Super Bowler
    - Super Hog Rider
    - Lava Hound
    - Balloon
    - Witch
    - Bowler

spells:
  mode: whitelist
  whitelist:
    - Rage Spell
    - Freeze Spell
    - Healing Spell
    - Earthquake Spell
    - Lightning Spell
    - Recall Spell
    - Overgrowth Spell
    - Haste Spell
    - Invisibility Spell

pets:
  mode: whitelist
  whitelist:
    - Frosty
    - Diggy
    - Poison Lizard
    - Phoenix
    - Spirit Fox

walls:
  pct_to_next_level: 0.5

town_hall: include
